name: Automation Tests

on:
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        default: sit
        required: true
      profile:
        description: Cucumber profile
        default: smoke
        required: true
      role:
        description: Login role
        default: user
        required: true
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: true
      ENV: ${{ github.event.inputs.env || 'sit' }}
      ROLE: ${{ github.event.inputs.role || 'user' }}
      BROWSER: chromium
      HEADLESS: true
      WORKERS: 4
      USER_NAME: ${{ secrets.USER_NAME }}
      USER_PASS: ${{ secrets.USER_PASS }}
      API_TOKEN: ${{ secrets.API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Run Cucumber tests
        run: node scripts/run-cucumber.js --env=${{ github.event.inputs.env || 'sit' }} --profile=${{ github.event.inputs.profile || 'smoke' }} --role=${{ github.event.inputs.role || 'user' }} --browser=chromium --workers=4

      - name: Generate reports
        if: always()
        run: npm run report:generate

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-reports
          path: osttra-framework/reports
